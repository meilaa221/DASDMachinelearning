<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Rumahku House Price{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#127968;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="d-flex">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">&#127968;</div>
            <div>
                <p class="brand-title">Rumahku</p>
                <p class="brand-subtitle">House Price Dashboard</p>
            </div>
        </div>
        <ul class="nav flex-column">
            {% for item in nav_items %}
            <li class="nav-item">
                <a class="nav-link {% if item.path == active_page %}active{% endif %}" href="{{ item.path }}">
                    <i class="bi {{ item.icon }}"></i> {{ item.label }}
                </a>
            </li>
            {% endfor %}
        </ul>
        <div class="sidebar-footer">
            <div class="footer-item">
                <span>Model aktif</span>
                <span class="badge-model">{{ best_model_name }}</span>
            </div>
            <div class="footer-item">
                <span>Jumlah data</span>
                <strong>{{ n_data }} properti</strong>
            </div>
        </div>
    </nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="content">
        <div class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Buka menu">
                    <i class="bi bi-list"></i>
                </button>
                <div class="breadcrumb-text">Rumahku / <strong>{{ page_title }}</strong></div>
            </div>
            <div class="topbar-right">
                <div class="topbar-icon"><i class="bi bi-bell"></i></div>
                <div class="avatar">R</div>
            </div>
        </div>
        <div class="page-body">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggleBtn = document.getElementById('sidebarToggle');

    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', closeSidebar);
    sidebar.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', closeSidebar));
</script>
</body>
</html>
